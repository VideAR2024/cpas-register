<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VIDEAR | Clean Coastal Twin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700&display=swap');
    html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; background: #080c10; }
    
    #overlay {
      position: absolute; top: 20px; left: 20px; z-index: 99;
      background: rgba(11, 16, 23, 0.9); border: 1px solid #1a2a3a;
      padding: 15px; color: #c8dde8; font-family: 'Barlow Condensed', sans-serif;
      backdrop-filter: blur(10px); width: 280px; pointer-events: none;
    }
    h1 { margin: 0; font-size: 18px; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
    .status { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #00d4ff; margin-top: 5px; }
  </style>

  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.30/"></script>

  <script>
    require(["esri/config", "esri/Map", "esri/views/SceneView"], function(esriConfig, Map, SceneView) {

      esriConfig.apiKey = "AAPTaB2f_QUvo4VmzjA0BGXhG8w..k9sDQyElBWsY8CQEY9HUldroxtOG06x4ZTHF8qv6yDs61Akac7nqUs0Cs-Zzp42O0GawXpcb7Jr83nDBUY3HEgPInVpWUHuHuyfvUnbDayboVjp0fKAqrkzn6KKKbLgJ24_fayGXX54PTiJE9N4trCntAGvMMuxzdqcb4lV8k-J3TBXa00Rp6zjMDiTxBkWiCGIZ_Ze5sabNwlZOm5yy0PQQAbhwvZJD6YHaO4xBRFohfSnO5cZGyj8noees-Ko.AT1_Nkfde0og";

      const map = new Map({
        // THIS IS THE KEY: "arcgis-navigation-night" gives that crisp Mapbox-style vector look
        basemap: "arcgis-navigation-night", 
        ground: "world-elevation" 
      });

      const view = new SceneView({
        container: "viewDiv",
        map: map,
        alphaCompositingEnabled: true,
        environment: {
          background: { type: "color", color: [8, 12, 16, 1] },
          starsEnabled: false,
          atmosphereEnabled: false, // Disabling atmosphere removes the "foggy" look
          lighting: {
            type: "virtual" // Virtual lighting prevents "muddy" shadows on the terrain
          }
        },
        camera: {
          position: [-0.245, 50.815, 2500], // Adjusted for Shoreham/Southwick area
          tilt: 60,
          heading: 110
        }
      });

      // Remove the "mesh" look of the ground to keep it clean
      view.on("pointer-down", function(event) { event.stopPropagation(); });
    });
  </script>
</head>
<body>
  <div id="overlay">
    <h1>COASTAL TWIN</h1>
    <div class="status">SYSTEM: ARCGIS ENGINE // MODE: CLEAN VECTOR</div>
  </div>
  <div id="viewDiv"></div>
</body>
</html>
